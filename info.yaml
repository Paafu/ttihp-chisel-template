project:
  title: "Delta Wing Fly-by-Wire Mixer"
  author: "Markus Jasper Lassen"
  description: "Tiny Tapeout delta wing elevon mixer with external IMU correction input. Generates two servo PWM outputs for left and right elevons."
  language: "Chisel"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_markus_delta_wing"

  source_files:
    - "src/tt_um_markus_delta_wing.v"
    - "src/ChiselTop.v"

pinout:
  ui[0]: "Pilot pitch bit 0"
  ui[1]: "Pilot pitch bit 1"
  ui[2]: "Pilot pitch bit 2"
  ui[3]: "Pilot pitch bit 3"
  ui[4]: "Pilot roll bit 0"
  ui[5]: "Pilot roll bit 1"
  ui[6]: "Pilot roll bit 2"
  ui[7]: "Pilot roll bit 3"

  uo[0]: "Left elevon servo PWM"
  uo[1]: "Right elevon servo PWM"
  uo[2]: "PWM frame sync debug"
  uo[3]: "Right mix debug bit 2"
  uo[4]: "Right mix debug bit 3"
  uo[5]: "Left mix debug bit 2"
  uo[6]: "Left mix debug bit 3"
  uo[7]: "Reserved"

  uio[0]: "IMU pitch correction bit 0"
  uio[1]: "IMU pitch correction bit 1"
  uio[2]: "IMU pitch correction bit 2"
  uio[3]: "IMU pitch correction bit 3"
  uio[4]: "IMU roll correction bit 0"
  uio[5]: "IMU roll correction bit 1"
  uio[6]: "IMU roll correction bit 2"
  uio[7]: "IMU roll correction bit 3"